name: Run Event Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Run Kyoto
        run: python watch_events.py

      - name: Run Osaka
        run: python watch_osaka.py

      - name: Run Kobe
        run: python watch_kobe.py
