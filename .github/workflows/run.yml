name: Run Event Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run script
        run: python watch_events.py
